app = 'burd-rg1taa'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[vm]]
  memory = '8gb'
  cpu_kind = 'shared'
  cpus = 4
  memory_mb = 8192
  processes = ['app']
  size = 'shared-cpu-4x'
