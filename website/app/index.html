<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burd Web App</title>
    <meta name="theme-color" content="#181e16" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Lora:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: #181e16;
        --foreground: #eee8d4;
        --muted-foreground: #8a9e82;
        --primary: #5f9470;
        --primary-foreground: #f0ead6;
        --border: #2f3a2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: "DM Sans", system-ui, sans-serif;
        color: var(--foreground);
        background:
          radial-gradient(ellipse 70% 50% at 50% 0%, rgba(95, 148, 112, 0.15), transparent),
          var(--background);
      }

      main {
        width: min(28rem, 100%);
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        text-align: center;
        background: rgba(31, 42, 28, 0.75);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: "Lora", Georgia, serif;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 1.5rem;
        color: var(--muted-foreground);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0.65rem 1.1rem;
        border-radius: 0.75rem;
        font-weight: 500;
        text-decoration: none;
        color: var(--primary-foreground);
        background: var(--primary);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Web app coming soon</h1>
      <p>
        The Burd web experience will live here. For now, head back to the landing page
        or check back later.
      </p>
      <a href="/">Back to burdapp.com</a>
    </main>
  </body>
</html>
