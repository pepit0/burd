name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "types/**"
      - "assets/**"
      - "global.css"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/sync-web-app.mjs"
      - "scripts/pages-build.mjs"
      - "scripts/verify-web-build.mjs"
      - "app/+html.tsx"
      - "wrangler.toml"
      - "website/wrangler.toml"
      - "website/package.json"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure Cloudflare Pages build (git deploys)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping Cloudflare project config (missing API token or account id)."
            exit 0
          fi

          curl -fsS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/burd" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "build_config": {
                "build_command": "npm run build",
                "destination_dir": ".",
                "root_dir": "website"
              }
            }'

      - name: Install dependencies
        run: npm ci

      - name: Build web app for /app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_INFERENCE_URL: ${{ secrets.EXPO_PUBLIC_INFERENCE_URL }}
        run: npm run build:web-app

      - name: Verify web build artifacts
        run: node scripts/verify-web-build.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website --project-name=burd --branch=main
          workingDirectory: .
