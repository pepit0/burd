name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "types/**"
      - "assets/**"
      - "global.css"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/sync-web-app.mjs"
      - "scripts/pages-build.mjs"
      - "wrangler.toml"
      - "website/wrangler.toml"
      - "website/package.json"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app for /app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_INFERENCE_URL: ${{ secrets.EXPO_PUBLIC_INFERENCE_URL }}
        run: npm run build:web-app

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy from repo root; wrangler.toml sets pages_build_output_dir = "website"
          command: pages deploy website --project-name=burd --branch=main
          workingDirectory: .
