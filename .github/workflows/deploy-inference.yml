name: Deploy inference to Fly.io

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-inference.yml"
  workflow_dispatch:

concurrency:
  group: deploy-inference
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Stopped machines can keep an old rootfs (e.g. Expo/npm from a mistaken
      # root deploy). Destroy them so the new Python image is always used.
      - name: Remove stale machines (wrong Expo/npm image)
        run: |
          set -euo pipefail
          APP=burd-inference
          ids=$(flyctl machines list -a "$APP" --json | jq -r '.[].id // empty')
          if [ -n "$ids" ]; then
            echo "Destroying stale machines: $ids"
            for id in $ids; do
              flyctl machine destroy "$id" -a "$APP" --force
            done
          else
            echo "No existing machines to destroy"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy burd-inference (Python server/, port 8000)
        run: flyctl deploy --remote-only --config fly.toml --strategy immediate --ha=false
        working-directory: server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify /health responds (Python server, not Expo)
        continue-on-error: true
        run: |
          # Models are baked into the image, so startup is usually 1-3 min. Give
          # a fresh machine up to ~10 min before warning (do not fail the deploy).
          for i in $(seq 1 20); do
            body=$(curl -sf --max-time 30 https://burd-inference.fly.dev/health || true)
            if echo "$body" | grep -q '"ok":true'; then
              echo "Health check passed:"
              echo "$body"
              exit 0
            fi
            echo "Waiting for inference server ($i/20)..."
            sleep 30
          done
          echo "::warning::/health did not return ok within ~10 min. The deploy"
          echo "::warning::finished; the machine may still be loading models."
          echo "::warning::Check: fly logs -a burd-inference (expect uvicorn, not expo)."
