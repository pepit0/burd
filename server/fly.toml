# Burd ML inference (birder photo ID + Perch sound ID).
# Deploy from the server/ directory: fly deploy --app burd-inference
#
# IMPORTANT: internal_port must be 8000 — uvicorn listens there, not 3000.

app = 'burd-inference'
primary_region = 'iad'

# ML image layers exceed the default 8GB unpack cap when uncompressed.
[rootfs]
  size_gb = 20
  persist = "restart"

# Swap as a safety net for transient allocation spikes.
swap_size_mb = 2048

[build]
  dockerfile = 'Dockerfile.fly'

# Pre-compile Perch at startup now that we have 4GB — first sound request is fast.
[env]
  AUDIO_WARMUP = '1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '300s'
    interval = '45s'
    method = 'GET'
    path = '/health'
    timeout = '60s'

# 4GB holds birder (PyTorch) + Perch (TensorFlow). Performance CPUs avoid
# shared-CPU steal so Live Photo ID stays closer to 1-model latency.
# Requires the Fly org memory/CPU caps to allow this (paid org).
[[vm]]
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 2
