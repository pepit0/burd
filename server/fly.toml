# Burd ML inference (birder photo ID + Perch sound ID).
# Deploy from the server/ directory: fly deploy --app burd-inference
#
# IMPORTANT: internal_port must be 8000 — uvicorn listens there, not 3000.

app = 'burd-inference'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '300s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '10s'

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 1
